{% extends "base.html" %}

{% block title %}{{ title }} - Oprosnik{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">{{ title }}</h1>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% include "surveys/partials/survey_fields.html" %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Сохранить</button>
                        <a class="btn btn-outline-secondary" href="{% url 'surveys:my_surveys' %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
