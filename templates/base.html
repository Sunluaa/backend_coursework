{% load static %}
<!doctype html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Oprosnik{% endblock %}</title>
    <script>
        (() => {
            const storageKey = "oprosnik-theme";
            try {
                const savedTheme = localStorage.getItem(storageKey);
                const hasSavedTheme = savedTheme === "dark" || savedTheme === "light";
                const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                const theme = hasSavedTheme ? savedTheme : (prefersDark ? "dark" : "light");
                document.documentElement.setAttribute("data-bs-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-bs-theme", "light");
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=20260427-15">
</head>
<body>
    {% include "includes/navbar.html" %}
    <main class="page-main">
        <div class="container app-container py-3 py-lg-4">
            {% include "includes/messages.html" %}
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer class="site-footer border-top py-3 mt-auto">
        <div class="container app-container footer-inner">
            <span class="footer-brand">Oprosnik</span>
            <span class="footer-text">Веб-сервис по созданию и управлению опросами</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}?v=20260427-15"></script>
</body>
</html>
